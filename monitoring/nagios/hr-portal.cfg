define host{
    use                     generic-host
    host_name               hr-portal
    alias                   HR Portal
    address                 host.docker.internal
    check_command           check_http!-H host.docker.internal -p 9090
    max_check_attempts      5
    check_interval          5
    retry_interval          1
}

define service{
    use                     generic-service
    host_name               hr-portal
    service_description     HR Portal HTTP
    check_command           check_http!-H host.docker.internal -p 9090
}
