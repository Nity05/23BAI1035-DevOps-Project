name: DevOps Cloud Reliability Platform CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Maven Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java 21 JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build Application & Run Tests
        run: mvn clean verify -B

  docker-build:
    name: Docker Container Build & Package
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Container Image
        run: docker build -t hr-portal:${{ github.sha }} -t hr-portal:latest .

  kubernetes-validate:
    name: Kubernetes Manifest Validation
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Validate Kubernetes YAML files
        run: |
          test -d k8s
          for file in k8s/*.yaml; do
            echo "Checking $file"
            grep -q "apiVersion:" "$file"
            grep -q "kind:" "$file"
          done