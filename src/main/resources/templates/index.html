<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Company Intranet Portal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
    <h1>Company Intranet Portal</h1>
    <p>Company news, HR policies, holiday calendars, announcements, and admin monitoring</p>
</header>

<nav>
    <a href="/">Home</a>
    <a href="/news">News</a>
    <a href="/policies">Policies</a>
    <a href="/holidays">Holidays</a>
    <a href="/announcements">Announcements</a>
    <a href="/contact">Contact</a>
</nav>

<main>
    <section class="grid">
        <div class="card" th:each="status : ${statuses}">
            <h2 th:text="${status.service}"></h2>
            <p class="green" th:text="${status.status}"></p>
            <p th:text="${status.details}"></p>
        </div>
    </section>

    <section class="panel">
        <h2>Latest News</h2>
        <div class="item" th:each="item : ${news}">
            <h3 th:text="${item.title}"></h3>
            <p th:text="${item.description}"></p>
            <small th:text="${item.date}"></small>
        </div>
    </section>

    <section class="panel">
        <h2>Announcements</h2>
        <div class="item" th:each="announcement : ${announcements}">
            <h3 th:text="${announcement.title}"></h3>
            <p th:text="${announcement.message}"></p>
        </div>
    </section>
</main>

<script src="/js/script.js"></script>
</body>
</html>
