spring.application.name=hr_portal
server.port=9090

# -----------------------------
# Actuator Configuration
# -----------------------------
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

# -----------------------------
# Prometheus & OpenTelemetry Metrics
# -----------------------------
management.prometheus.metrics.export.enabled=true
management.metrics.export.prometheus.enabled=true

# -----------------------------
# Graphite Metrics Export
# -----------------------------
management.metrics.export.graphite.enabled=false
management.metrics.export.graphite.host=graphite
management.metrics.export.graphite.port=2003
management.metrics.export.graphite.step=10s

# -----------------------------
# Global Metric Tags
# -----------------------------
management.metrics.tags.application=hr_portal
management.metrics.tags.environment=production
management.metrics.tags.service=cloud-reliability-platform