# ==========================
# Application
# ==========================
spring.application.name=hr_portal
server.port=9090

# ==========================
# Actuator
# ==========================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
management.info.env.enabled=true

# ==========================
# Graphite Metrics Export
# ==========================
management.metrics.export.graphite.enabled=true
management.metrics.export.graphite.host=host.docker.internal
management.metrics.export.graphite.port=2003
management.metrics.export.graphite.protocol=plaintext
management.metrics.export.graphite.step=10s

# ==========================
# Metric Tags
# ==========================
management.metrics.tags.application=hr_portal